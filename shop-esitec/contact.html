<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShopESITEC — Contact</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>
<body>

  <header class="site-header">
    <div class="container header-content">
      <a href="index.html" class="logo">Shop<span>ESITEC</span></a>
      <nav class="main-nav">
        <ul>
          <li><a href="index.html">Accueil</a></li>
          <li><a href="products.html">Produits</a></li>
          <li><a href="cart.html">Panier <span id="cart-count" class="cart-badge">0</span></a></li>
          <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <section class="page-banner">
    <div class="container">
      <h1>Contactez-nous</h1>
      <p>Une question ? Nous sommes là pour vous aider</p>
    </div>
  </section>

  <section class="container contact-section">
    <div class="contact-info">
      <h3>Nos coordonnées</h3>
      <p>📍 Dakar, Sénégal</p>
      <p>📞 +221 33 000 00 00</p>
      <p>📧 contact@shopesitec.sn</p>
      <p>🕐 Lun - Ven : 9h - 18h</p>
    </div>
    <form class="contact-form" id="contact-form">
      <div class="form-group">
        <label for="name">Nom complet</label>
        <input type="text" id="name" name="name" placeholder="Votre nom" />
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="votre@email.com" />
      </div>
      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" name="message" placeholder="Votre message..."></textarea>
      </div>
      <button type="submit" class="btn btn-primary">Envoyer</button>
      <p id="form-feedback" class="form-feedback"></p>
    </form>
  </section>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; 2024 ShopESITEC — Projet pédagogique. Tous droits réservés.</p>
    </div>
  </footer>

  <script src="js/products.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
